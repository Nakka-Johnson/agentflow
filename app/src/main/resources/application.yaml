spring:
  application:
    name: agentflow

server:
  port: 8080

management: 
  endpoints:
    web:
      exposure:
        include: health,info,metrics

agentflow:
  agent:
    implementation: stub
  bedrock:  
    region: us-east-1
    model-id: anthropic.claude-3-haiku-20240307-v1:0
    max-tokens: 1024
    temperature: 0.3
  retrieval:
    base-url: http://localhost:8001
    default-k: 4